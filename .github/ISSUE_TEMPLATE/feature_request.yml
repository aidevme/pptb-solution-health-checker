name: Feature Request
description: Suggest a new feature or improvement to the plugin
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve PPTB Solution Health Checker? Describe it below.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of the plugin does this relate to?
      options:
        - Rule engine
        - Azure rule hosting / deployment
        - PPTB plugin UI / UX
        - ALM / DevOps integration
        - Reporting / output
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? What is the current limitation?
      placeholder: "As a Power Platform developer, I find it difficult to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, or links to related resources.
